<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>bookreader</title>
    <!-- <link rel="stylesheet" href="/pages/style.css" /> -->
    <script src="/src/way-inline.js"></script>
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body>
    <header>bookreader</header>
    <main x-comp="epub">
      <h1>bookreader</h1>
      <section x-show="!book.value">
        <input
          name="src"
          id="src"
          type="file"
          accept=".epub"
          @change="fileSelect($event)"
        />
      </section>
      <article x-else>
        <h2 x-text="title.value || 'epub'"></h2>
        <button @click="changeBook()">Change Book</button>
        <div x-comp="reader" x-props="{book}">
          <button
            @click="playpause()"
            x-text="isPlaying.value ? 'Pause' : 'play'"
            :disabled="loadingAudio.value"
          ></button>
          <button @click="prev()">Previous</button>
           <span>
             {pIndex.value}
           </span>
          <button @click="next()">Next</button>
        </div>
        <audio id="player"></audio>
        <div id="epub"></div>
      </article>
    </main>
  </body>
</html>
